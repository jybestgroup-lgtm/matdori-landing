<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 신청 완료 | 맛도리감자탕 창업</title>
<meta name="robots" content="noindex">
<!-- ===== Meta Pixel (맛도리감자탕 전용) — Lead 완료 페이지 ===== -->
<script>
  var MATDORI_PIXEL_ID = "여기에_맛도리감자탕_픽셀ID";  // ▼ 랜딩과 동일 ID로 교체
  // 정상 제출로 도달했을 때만 전환 발생 (완료페이지 직접 접속/새로고침 시 Lead 미발생)
  var LEAD_OK=false; try{ LEAD_OK = sessionStorage.getItem('matdori_lead')==='1'; if(LEAD_OK) sessionStorage.removeItem('matdori_lead'); }catch(e){}
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  if(MATDORI_PIXEL_ID.indexOf('여기에')!==0){
    fbq('init', MATDORI_PIXEL_ID);
    fbq('track','PageView');
    if(LEAD_OK){ fbq('track','Lead'); }   // 제출 성공으로 도달했을 때만
  }
</script>
<!-- ===== Google Analytics 4 (맛도리감자탕) — 완료/전환 ===== -->
<script>
  var GA4_ID = "여기에_GA4_측정ID";  // 랜딩과 동일 ID
  if(GA4_ID.indexOf('G-')===0){
    var _ga=document.createElement('script');_ga.async=true;
    _ga.src='https://www.googletagmanager.com/gtag/js?id='+GA4_ID;
    document.head.appendChild(_ga);
    window.dataLayer=window.dataLayer||[];
    window.gtag=function(){dataLayer.push(arguments);};
    gtag('js', new Date());
    gtag('config', GA4_ID);
    if(LEAD_OK){ gtag('event','generate_lead',{brand:'matdori'}); }  // 제출 성공 시에만
  }
</script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',sans-serif;background:#fff;color:#191919;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 28px;}
  .check{width:84px;height:84px;border-radius:50%;background:#EE5A0E;color:#fff;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:26px;}
  h1{font-size:27px;font-weight:800;letter-spacing:-.6px;margin-bottom:14px;line-height:1.4;}
  p{font-size:17px;color:#666;line-height:1.75;margin-bottom:8px;}
  .brand{margin-top:34px;font-weight:800;color:#EE5A0E;font-size:18px;}
  .home{margin-top:30px;display:inline-block;color:#EE5A0E;font-weight:700;font-size:16px;text-decoration:none;border:1.5px solid #EE5A0E;border-radius:8px;padding:13px 24px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="check">✓</div>
    <h1>상담 신청이<br>정상 접수되었습니다</h1>
    <p>맛도리감자탕 창업 담당자가<br>순차적으로 연락드리겠습니다.</p>
    <p>편안한 마음으로 잠시만 기다려 주세요.</p>
    <div class="brand">맛도리감자탕 · 청주 사창 본점</div>
    <a class="home" href="./">← 랜딩으로 돌아가기</a>
  </div>
</body>
</html>
